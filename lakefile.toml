name = "Etheorem"

# Umbrella package coordinating the subpackages. It declares no Lean
# library of its own — building the umbrella delegates to the
# sub-packages via the `[[require]]` blocks below.
#
# Common targets (build by name from the repo root):
#   lake build LeanSha256
#   lake build LeanHazmatSha256        # consensus crypto — FFI families
#   lake build LeanHazmatBls           #   (need `just vendor-bls` / `vendor-kzg`)
#   lake build LeanHazmatKzg
#   lake build SizzLean
#   lake build EthCLLib / EthCLSpecs   # consensus-spec framework + Fulu/Gloas bodies
#   lake build LeanPoseidon
#   lake build SizzLeanTests
#   lake build LeanHazmatSha256Tests / LeanHazmatBlsTests / LeanHazmatKzgTests
#   lake build pyspec_server           # EthCLSpecs runner (state transition / fork choice / ssz_static)
#   lake build ssz_generic_runner      # SizzLean runner (ssz_generic wire-format suite)
#
# Or per-package: `cd packages/<Name> && lake build`.
# The LeanHazmat aggregator meta-packages (LeanHazmatConsensus,
# LeanHazmatExecution, top LeanHazmat umbrella) + the execution-layer
# families are deferred (see hazmat-docs/PLAN.md).

[[require]]
name = "LeanSha256"
path = "packages/LeanSha256"

# LeanHazmat — FFI crypto family (hazmat-docs/ARCHITECTURE.md).
# Consensus families ship first; execution-layer families are deferred.
# SHA-256 leads: it needs no vendoring, so it de-risks the per-family
# model. `SizzLean` requires it for the FFI hash path.
[[require]]
name = "LeanHazmatSha256"
path = "packages/LeanHazmatSha256"

# BLS12-381 (blst, vendored). Needs `just vendor-bls` before `lake build`.
# Single blst owner for the family — LeanHazmatKzg shares this blst.
[[require]]
name = "LeanHazmatBls"
path = "packages/LeanHazmatBls"

# KZG / EIP-4844 + Fulu (c-kzg-4844, vendored against LeanHazmatBls's blst).
# Needs `just vendor-bls` AND `just vendor-kzg` before `lake build`.
[[require]]
name = "LeanHazmatKzg"
path = "packages/LeanHazmatKzg"

# (The LeanHazmatConsensus aggregator over the three families is deferred —
# YAGNI until a consumer needs a whole crypto layer in one require; see
# hazmat-docs/PLAN.md Stage 4. The families are consumed à la carte today.)

[[require]]
name = "SizzLean"
path = "packages/SizzLean"

# EthCLLib — the consensus-spec framework / DSL (the capturing fork forms, the
# header macros, the effect monad, the tier and error systems, the container
# front-end, the crypto seam, the fork-interface typeclass, the generic
# PySpecTests driver). Builds on SizzLean + LeanHazmatBls/Kzg.
[[require]]
name = "EthCLLib"
path = "packages/EthCLLib"

# EthCLSpecs — the fork bodies (EthCLSpecs.Fulu, later .Gloas) implementing the
# fork interface, plus the `pyspec_server` conformance runner. The deferred
# proofs package (EthCLProofs, + mathlib) stays out of the umbrella, the
# LeanPoseidonProofs containment pattern.
[[require]]
name = "EthCLSpecs"
path = "packages/EthCLSpecs"

# Standalone island, parallel to `LeanSha256` (a pure-crypto
# primitive), outside the `LeanSha256 → SizzLean → EthCLLib → EthCLSpecs`
# SSZ chain, nothing here imports it. Building the umbrella builds it.
[[require]]
name = "LeanPoseidon"
path = "packages/LeanPoseidon"
